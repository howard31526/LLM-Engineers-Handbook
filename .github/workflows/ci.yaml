name: CI

on:
  pull_request:
  workflow_dispatch:
    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Install poetry
        uses: abatilo/actions-poetry@v2
        with:
          poetry-version: 1.8.3

      - name: Install packages
        run: |
          poetry install --only dev
          poetry self add 'poethepoet[poetry_plugin]'

      - name: gitleaks check
        run: poetry poe gitleaks-check

      - name: Lint check [Python]
        run: poetry poe lint-check

      - name: Format check [Python]
        run: poetry poe format-check

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"

      - name: Install poetry
        uses: abatilo/actions-poetry@v2
        with:
          poetry-version: 1.8.3

      - name: Install packages (debug)
        run: |
          set -euxo pipefail
          poetry --version
          poetry install --with dev --without api -vvv || { poetry debug info || true; exit 1; }
          poetry show --tree | sed -n '1,200p'
          
      - name: Login to ZenML Server
        env:
          ZENML_SERVER_URL:  ${{ secrets.ZENML_SERVER_URL }}
          ZENML_API_KEY:     ${{ secrets.ZENML_API_KEY }}
          ZENML_WORKSPACE:   ${{ secrets.ZENML_WORKSPACE }}
        run: |
          set -euxo pipefail
          poetry run zenml login "${ZENML_SERVER_URL}" \
            --api-key "${ZENML_API_KEY}" \
            --workspace "${ZENML_WORKSPACE}"

      - name: Run tests
        run: |
          poetry poe test

